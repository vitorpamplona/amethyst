<!doctype html>
<!--
  Trusted napplet shell page (served from app assets at https://napplet.local/__shell__).
  It hosts the untrusted applet in an opaque-origin sandboxed iframe and relays capability
  messages between the applet (window.postMessage) and the native bridge (__nappletBridge),
  which is origin-restricted to this page only. The applet iframe can never reach the bridge.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Napplet</title>
    <style>
      html, body, iframe { margin: 0; padding: 0; border: 0; width: 100%; height: 100%; background: #fff; }
    </style>
  </head>
  <body>
    <iframe id="app" sandbox="allow-scripts" referrerpolicy="no-referrer"></iframe>
    <script>
      (function () {
        var iframe = document.getElementById('app');
        var bridge = window.__nappletBridge;

        // applet -> native: only forward messages that came from our applet iframe.
        // The @napplet SDK posts structured-clone objects; our injected shim posts strings. The
        // native bridge carries only strings, so serialize objects here. (Requests carry no Blobs.)
        function forward(data) {
          if (typeof data !== 'string') {
            try { data = JSON.stringify(data); } catch (_) { return; }
          }
          if (bridge) bridge.postMessage(data);
        }
        window.addEventListener('message', function (e) {
          if (e.source !== iframe.contentWindow) return;
          var data = e.data;
          // upload.upload carries a Blob/ArrayBuffer in request.data that JSON can't serialize —
          // inline it as base64 (request.dataBase64) before forwarding to native.
          if (data && data.type === 'upload.upload' && data.request &&
              (data.request.data instanceof Blob || data.request.data instanceof ArrayBuffer)) {
            var blob = data.request.data instanceof Blob ? data.request.data : new Blob([data.request.data]);
            var reader = new FileReader();
            reader.onloadend = function () {
              data.request.dataBase64 = String(reader.result).split(',')[1] || '';
              delete data.request.data;
              forward(data);
            };
            reader.onerror = function () { /* drop a blob we can't read */ };
            reader.readAsDataURL(blob);
            return;
          }
          forward(data);
        });

        // native -> applet: hand the broker's reply (or a subscription push) down into the iframe as
        // a structured-clone object, which is what the SDK expects (it reads e.data.type, not a string).
        if (bridge) {
          bridge.onmessage = function (e) {
            var msg;
            try { msg = JSON.parse(e.data); } catch (_) { return; }
            // resource.bytes resolves to a real Blob in the SDK; rebuild it from the base64 the host sent.
            if (msg && msg.type === 'resource.bytes.result' && typeof msg.bytes === 'string') {
              try {
                var bin = atob(msg.bytes), u = new Uint8Array(bin.length);
                for (var i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
                msg.blob = new Blob([u], { type: msg.mime || '' });
                delete msg.bytes;
              } catch (_) {}
            }
            iframe.contentWindow.postMessage(msg, '*');
          };
        }

        iframe.src = 'https://napplet.local/app/';
      })();
    </script>
  </body>
</html>
